# Generated by scripts/build/prepare-databricks-app.mjs from root app.yaml.
# Edit env / resources in the repo-root app.yaml; this file is regenerated on every deploy.
command:
  - "sh"
  - "-c"
  - "RUNTIME_DIR=${TMPDIR:-/tmp}/eg-app-runtime; rm -rf $RUNTIME_DIR; mkdir -p $RUNTIME_DIR; cp -R . $RUNTIME_DIR; cd $RUNTIME_DIR; tar --warning=no-unknown-keyword -xzf node_modules.tgz 2>/dev/null || tar -xzf node_modules.tgz; node server.js"

env:
  # Next.js standalone server reads PORT and HOSTNAME. Databricks Apps provides
  # DATABRICKS_APP_PORT; HOSTNAME ensures the server binds inside the container.
  - name: NODE_ENV
    value: production
  - name: HOSTNAME
    value: 0.0.0.0
  - name: NODE_OPTIONS
    value: "--max-old-space-size=4096"

  # Workspace host. Literal for standalone git deploys; the resource block
  # below grants the app service principal access.
  - name: EG_DATABRICKS_HOST
    value: https://fe-vm-alice.cloud.databricks.com

  # Lakebase Postgres instance `eg-fuel-pricing` (created via the Databricks
  # database CLI). The service principal identity comes from the Apps runtime;
  # the @databricks/lakebase pool mints OAuth credentials against this instance.
  - name: PGHOST
    value: ep-nameless-tooth-d2gveqy4.database.us-east-1.cloud.databricks.com
  - name: PGDATABASE
    value: databricks_postgres
  - name: PGPORT
    value: "5432"
  - name: EG_LAKEBASE_DB
    value: databricks_postgres
  - name: EG_LAKEBASE_INSTANCE
    value: eg-fuel-pricing
  - name: PGSSLMODE
    value: require

  # EG namespace — app schema for pricing tables.
  - name: EG_PG_APP_SCHEMA
    value: eg_app

  # Model Serving endpoints powering the pricing agents. The fast endpoint is
  # used by the specialist analyst agents; the flagship endpoint synthesises
  # the final recommendation.
  - name: EG_LLM_ENDPOINT
    value: serving-endpoints/databricks-claude-sonnet-4-6/invocations
  - name: EG_LLM_FAST_ENDPOINT
    value: serving-endpoints/databricks-claude-haiku-4-5/invocations

# Resource declarations grant the app service principal access on deploy.
# Runtime config still uses literal env values above so the standalone bundle
# does not depend on valueFrom injection.
resources:
  - name: eg-database
    description: Lakebase Postgres instance backing the EG fuel pricing app schema.
    database:
      instance_name: eg-fuel-pricing
      database_name: databricks_postgres
      permission: CAN_CONNECT_AND_CREATE
